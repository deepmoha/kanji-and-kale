<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1c3a1c">
<title>Shopping · Kanji & Kale</title>
<link href="https://fonts.googleapis.com/css2?family=Roca+Two&family=Work+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf7f2;--card:#ffffff;--gold:#b87800;--goldp:#fef3dc;--terra:#c4380a;--green:#2a7a2a;--greenl:#3a8a1a;--greenp:#eaf4e0;--ink:#1a1a1a;--mu:#5a6a58;--border:#d8e8d0;--nav-h:68px;--top-h:56px;--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:'Work Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.6;padding-top:var(--top-h);padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px);min-height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--top-h);background:#1c3a1c;border-bottom:1px solid #2a5a2a;display:flex;align-items:center;gap:12px;padding:0 16px}
.topbar-title{font-family:'Roca Two',serif;font-size:20px;color:#fff;flex:1}
.topbar-title em{color:var(--gold);font-style:italic}
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid var(--border);height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);display:flex}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;color:var(--mu);font-family:'Work Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.04em;padding:8px 4px 4px;text-decoration:none;text-transform:uppercase}
.nav-item.active{color:#2a7a2a}
.nav-item .ni{font-size:24px;line-height:1}
.page{padding:12px 14px 0}
.quick-add{display:flex;gap:8px;margin-bottom:14px}
.quick-add input{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:'Work Sans',sans-serif;font-size:14px;background:#fff;color:var(--ink)}
.quick-add input:focus{outline:none;border-color:var(--greenl)}
.quick-add button{padding:11px 16px;border-radius:12px;border:none;background:#1c3a1c;color:#fff;font-weight:700;cursor:pointer;font-size:14px;white-space:nowrap}
.section-hdr{display:flex;align-items:center;gap:8px;padding:0 4px;margin-bottom:8px;margin-top:16px}
.section-hdr:first-of-type{margin-top:4px}
.sh-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);flex:1}
.sh-count{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace}
.sh-clear{font-size:11px;color:var(--terra);font-weight:700;cursor:pointer;background:none;border:none;font-family:'Work Sans',sans-serif;padding:2px 6px}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;display:flex;align-items:center;gap:12px;padding:12px 14px;transition:opacity .2s}
.item-card.done{opacity:.45}
.item-card.done .item-name{text-decoration:line-through;color:var(--mu)}
.check-box{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.check-box.checked{background:#1c3a1c;border-color:#1c3a1c}
.check-box.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
.item-body{flex:1;min-width:0}
.item-name{font-size:15px;color:var(--ink);font-weight:500}
.item-meta{font-size:12px;color:var(--mu);margin-top:1px}
.item-cat{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700;margin-left:auto;flex-shrink:0}
.cat-veg{background:var(--greenp);color:#1a4a1a}
.cat-dal{background:var(--goldp);color:#6a3a00}
.cat-spice{background:#fdf0ea;color:#7a3010}
.cat-pantry{background:#f0f0fa;color:#3a3a8a}
.cat-fridge{background:#e8f8f8;color:#0a5a5a}
.cat-other{background:#f0f0f0;color:#3a3a3a}
.item-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:0 4px;flex-shrink:0;line-height:1}
.item-del:hover{color:var(--terra)}
.empty-msg{text-align:center;padding:40px 20px;color:var(--mu);font-size:13px}
.empty-msg .em-ico{font-size:40px;margin-bottom:10px}
.progress-bar{background:#e8f0e0;border-radius:20px;height:6px;margin-bottom:16px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,#1c3a1c,var(--greenl));height:100%;border-radius:20px;transition:width .3s}
.progress-lbl{font-size:12px;color:var(--mu);margin-bottom:6px;display:flex;justify-content:space-between}
.topbar-actions{display:flex;gap:8px}
.topbar-btn{padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Work Sans',sans-serif}
.cat-filter{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.cat-filter::-webkit-scrollbar{display:none}
.cf-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--mu);font-size:12px;font-weight:700;cursor:pointer;font-family:'Work Sans',sans-serif;white-space:nowrap}
.cf-btn.active{background:#1c3a1c;color:#fff;border-color:#1c3a1c}
.preset-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px}
.preset-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.preset-grid{display:flex;flex-wrap:wrap;gap:6px}
.preset-btn{padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--mu);font-size:12px;font-weight:700;cursor:pointer;font-family:'Work Sans',sans-serif}
.preset-btn:hover{border-color:var(--greenl);color:var(--green)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🛒 <em>Shopping</em></div>
  <div class="topbar-actions">
    <button class="topbar-btn" onclick="clearChecked()">Clear done</button>
    <button class="topbar-btn" onclick="shareList()">Share</button>
  </div>
</div>

<div class="page">

  <!-- ADD ITEM -->
  <div class="quick-add">
    <input type="text" id="addInput" placeholder="Add item (e.g. 500g okra, horse gram 2kg)" onkeydown="if(event.key==='Enter')addItem()">
    <button onclick="addItem()">Add</button>
  </div>

  <!-- PROGRESS -->
  <div class="progress-lbl">
    <span id="progressLbl">0 of 0 done</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <!-- CATEGORY FILTER -->
  <div class="cat-filter">
    <button class="cf-btn active" onclick="setFilter('all',this)">All</button>
    <button class="cf-btn" onclick="setFilter('veg',this)">🥬 Vegetables</button>
    <button class="cf-btn" onclick="setFilter('dal',this)">🫘 Dal & Legumes</button>
    <button class="cf-btn" onclick="setFilter('fridge',this)">🧊 Fridge</button>
    <button class="cf-btn" onclick="setFilter('pantry',this)">🫙 Pantry</button>
    <button class="cf-btn" onclick="setFilter('spice',this)">🌶 Spices</button>
    <button class="cf-btn" onclick="setFilter('other',this)">📦 Other</button>
  </div>

  <!-- PRESETS -->
  <div class="preset-section">
    <div class="preset-title">⚡ Quick add — weekly staples</div>
    <div class="preset-grid" id="presetGrid"></div>
  </div>

  <!-- LIST -->
  <div id="listContainer"></div>

  <div class="empty-msg" id="emptyMsg" style="display:none">
    <div class="em-ico">🛒</div>
    <div>Your list is empty.<br>Add items above or tap a weekly staple.</div>
  </div>

</div>

<nav class="bottomnav">
  <a class="nav-item" href="index.html"><span class="ni">🏠</span>Today</a>
  <a class="nav-item" href="recipes.html"><span class="ni">🃏</span>Recipes</a>
  <button class="nav-item active"><span class="ni">🛒</span>Shop</button>
  <a class="nav-item" href="sprouting.html"><span class="ni">🌱</span>Sprouts</a>
  <a class="nav-item" href="planner.html"><span class="ni">📅</span>Plan</a>
</nav>

<script>
const PRESETS = [
  {n:'Cauliflower 1kg',cat:'veg'},{n:'Broccoli 500g',cat:'veg'},{n:'Okra (Vendakkai) 2kg',cat:'veg'},
  {n:'Drumstick (Murungakkai) 6 pcs',cat:'veg'},{n:'Spinach 500g',cat:'veg'},{n:'Beetroot 500g',cat:'veg'},
  {n:'Carrot 1kg',cat:'veg'},{n:'Cabbage 1 head',cat:'veg'},{n:'Beans 500g',cat:'veg'},
  {n:'Tomatoes 1kg',cat:'veg'},{n:'Shallots 500g',cat:'veg'},{n:'Raw banana 4 pcs',cat:'veg'},
  {n:'Toor dal 1kg',cat:'dal'},{n:'Moong dal 500g',cat:'dal'},{n:'Horse gram (Kollu) 500g',cat:'dal'},
  {n:'Chana dal 500g',cat:'dal'},{n:'Tofu 2 packs (extra firm)',cat:'fridge'},
  {n:'Organic soy beans 500g',cat:'pantry'},{n:'Ground flaxseed 250g',cat:'pantry'},
  {n:'Avocado oil 1 bottle',cat:'pantry'},{n:'Amla powder 100g',cat:'pantry'},
  {n:'Kalonji (Nigella seeds) 100g',cat:'spice'},{n:'Sambar powder 200g',cat:'spice'},
  {n:'Curry leaves (fresh bunch)',cat:'veg'},{n:'Brazil nuts (4 pack for selenium)',cat:'pantry'},
  {n:'Seed DS-01 probiotic (reorder)',cat:'other'},{n:'Almond meal 500g',cat:'pantry'},
];

const CAT_LABELS = {veg:'🥬 Vegetables',dal:'🫘 Dal & Legumes',fridge:'🧊 Fridge',pantry:'🫙 Pantry',spice:'🌶 Spices',other:'📦 Other'};
const CAT_CSS = {veg:'cat-veg',dal:'cat-dal',fridge:'cat-fridge',pantry:'cat-pantry',spice:'cat-spice',other:'cat-other'};

let items = [];
let activeFilter = 'all';
let nextId = 1;

function load() {
  const saved = localStorage.getItem('kkShoppingList');
  if (saved) {
    try {
      const d = JSON.parse(saved);
      items = d.items || [];
      nextId = d.nextId || (items.length + 1);
    } catch(e) { items = []; }
  }
}

function save() {
  localStorage.setItem('kkShoppingList', JSON.stringify({items, nextId}));
}

function detectCat(name) {
  const n = name.toLowerCase();
  if (/dal|gram|rajma|chana|lentil|kollu|moong|toor|urad|masoor|legume|bean|pea/.test(n)) return 'dal';
  if (/tofu|paneer|yogurt|curd|milk|cream|cheese|egg|butter/.test(n)) return 'fridge';
  if (/spice|masala|powder|seeds|cumin|coriander|turmeric|pepper|chilli|cardamom|cinnamon|clove|ajwain|kalonji|fenugreek|mustard seed|bay|saffron/.test(n)) return 'spice';
  if (/oil|flax|amla|tamarind|coconut|almond meal|brazil|supplement|probiotic|oat|rice|flour|millet|chia|hemp|walnut|sesame paste|soy bean|almond milk/.test(n)) return 'pantry';
  if (/cauliflower|broccoli|cabbage|carrot|bean|okra|spinach|beetroot|potato|banana|gourd|turnip|yam|drumstick|tomato|onion|shallot|capsicum|corn|peas|zucchini|kale|radish|mushroom|leek|fennel|celery|lettuce|arugula|kothavar|kovakkai|senai|surakkai|vazhai|murungai|peerkang/.test(n)) return 'veg';
  return 'other';
}

function addItem(nameOverride) {
  const inp = document.getElementById('addInput');
  const name = (nameOverride || inp.value).trim();
  if (!name) return;
  const cat = detectCat(name);
  items.push({id: nextId++, name, cat, done: false});
  save();
  render();
  if (!nameOverride) inp.value = '';
}

function toggleItem(id) {
  const item = items.find(i=>i.id===id);
  if (item) { item.done = !item.done; save(); render(); }
}

function deleteItem(id) {
  items = items.filter(i=>i.id!==id);
  save();
  render();
}

function clearChecked() {
  items = items.filter(i=>!i.done);
  save();
  render();
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.cf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const container = document.getElementById('listContainer');
  const visible = activeFilter === 'all' ? items : items.filter(i=>i.cat===activeFilter);

  if (items.length === 0) {
    container.innerHTML = '';
    document.getElementById('emptyMsg').style.display = 'block';
    updateProgress();
    return;
  }
  document.getElementById('emptyMsg').style.display = 'none';

  // Group by category
  const groups = {};
  visible.forEach(item => {
    if (!groups[item.cat]) groups[item.cat] = [];
    groups[item.cat].push(item);
  });

  const catOrder = ['veg','dal','fridge','pantry','spice','other'];
  let html = '';

  catOrder.forEach(cat => {
    const grp = groups[cat];
    if (!grp || grp.length === 0) return;
    const doneCount = grp.filter(i=>i.done).length;
    html += `<div class="section-hdr">
      <span class="sh-title">${CAT_LABELS[cat]||cat}</span>
      <span class="sh-count">${doneCount}/${grp.length}</span>
      <button class="sh-clear" onclick="clearCat('${cat}')">clear done</button>
    </div>`;
    grp.forEach(item => {
      html += `<div class="item-card${item.done?' done':''}" id="card-${item.id}">
        <div class="check-box${item.done?' checked':''}" onclick="toggleItem(${item.id})"></div>
        <div class="item-body">
          <div class="item-name">${item.name}</div>
        </div>
        <span class="item-cat ${CAT_CSS[item.cat]||'cat-other'}">${item.cat}</span>
        <button class="item-del" onclick="deleteItem(${item.id})">✕</button>
      </div>`;
    });
  });

  container.innerHTML = html || '<div style="padding:20px;text-align:center;color:var(--mu);font-size:13px">No items in this category.</div>';
  updateProgress();
}

function clearCat(cat) {
  items = items.filter(i=>!(i.cat===cat && i.done));
  save();
  render();
}

function updateProgress() {
  const total = items.length;
  const done = items.filter(i=>i.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressLbl').textContent = `${done} of ${total} done`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function shareList() {
  const remaining = items.filter(i=>!i.done);
  if (!remaining.length) { alert('Nothing left to buy!'); return; }
  const text = 'Shopping list:\n' + remaining.map(i=>'• ' + i.name).join('\n');
  if (navigator.share) {
    navigator.share({title:'Kanji & Kale — Shopping', text});
  } else {
    navigator.clipboard.writeText(text).then(()=>alert('List copied to clipboard!'));
  }
}

function buildPresets() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = PRESETS.map(p =>
    `<button class="preset-btn" onclick="addItem('${p.n.replace(/'/g,"\\'")}')">${p.n}</button>`
  ).join('');
}

load();
buildPresets();
render();
</script>
</body>
</html>
